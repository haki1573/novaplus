version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gms_postgres
    environment:
      POSTGRES_USER: gms_user
      POSTGRES_PASSWORD: gms_password
      POSTGRES_DB: gms_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: